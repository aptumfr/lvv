name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libjpeg-turbo8-dev libboost-system-dev libasio-dev

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(nproc)

      - name: Unit tests
        run: ./build/lvv_tests

  integration-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          path: lvv

      - uses: actions/checkout@v5
        with:
          repository: lvgl/lvgl
          ref: v9.5.0
          path: lvgl

      - uses: actions/checkout@v5
        with:
          repository: aptumfr/lv
          ref: master
          path: lv

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libjpeg-turbo8-dev libboost-system-dev libasio-dev libegl-dev libx11-dev

      - name: Build lvv
        run: |
          cd lvv
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(nproc)

      - name: Build headless demo
        env:
          LVGL_DIR: ${{ github.workspace }}/lvgl
          LV_CPP_DIR: ${{ github.workspace }}/lv
        run: |
          cd lvv/example
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(nproc) --target demo_headless

      - name: Run integration tests
        run: |
          lvv/example/build/demo_headless > demo.log 2>&1 &
          DEMO_PID=$!
          for i in $(seq 1 20); do
            lvv/build/lvv --port 5555 ping && break
            if ! kill -0 $DEMO_PID 2>/dev/null; then
              echo "demo_headless crashed:"
              cat demo.log
              exit 1
            fi
            [ $i -eq 20 ] && { echo "Spy not ready after 10s. Demo log:"; cat demo.log; exit 1; }
            sleep 0.5
          done
          lvv/build/lvv --port 5555 run \
            --output results.xml \
            lvv/tests/example_tests/

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results
          path: results.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: results.xml
          check_name: LVV Integration Test Results

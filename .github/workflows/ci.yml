name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(nproc)

      - name: Unit tests
        run: ./build/lvv_tests

  integration-tests:
    runs-on: ubuntu-24.04
    steps:
      # Check out all three repos as siblings (same layout as local dev)
      - uses: actions/checkout@v4
        with:
          path: lv2

      - uses: actions/checkout@v4
        with:
          repository: lvgl/lvgl
          ref: master
          path: lvgl

      # Adjust this to your lv:: wrapper repo
      - uses: actions/checkout@v4
        with:
          repository: aspect-apps/lv
          ref: main
          path: lv

      - name: Build lvv
        run: |
          cd lv2
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(nproc)

      - name: Build headless demo
        env:
          LVGL_DIR: ${{ github.workspace }}/lvgl
          LV_CPP_DIR: ${{ github.workspace }}/lv
        run: |
          cd lv2/example
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(nproc) --target demo_headless

      - name: Run integration tests
        run: |
          lv2/example/build/demo_headless &
          for i in $(seq 1 20); do
            lv2/build/lvv --port 5555 ping && break
            [ $i -eq 20 ] && { echo "Spy not ready"; exit 1; }
            sleep 0.5
          done
          lv2/build/lvv --port 5555 run \
            --output results.xml \
            lv2/tests/example_tests/

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests
          path: results.xml
          reporter: java-junit
